<div class="grid h-screen grid-rows-[4rem_minmax(0,1fr)] overflow-hidden bg-gray-50">
  <app-header (toggleSidebar)="toggleSidebar()"></app-header>

  <div class="relative min-h-0 overflow-hidden">
    @if (isMobile() && isSidebarOpen()) {
      <div
        class="fixed inset-0 top-16 z-20 bg-black/30 transition-opacity lg:hidden"
        (click)="closeSidebarOnMobile()"
      ></div>
    }

    <div class="grid h-full min-h-0 grid-cols-[auto_minmax(0,1fr)]">
      <app-sidebar
        [isOpen]="isSidebarOpen()"
        [isMobile]="isMobile()"
        (closeSidebar)="closeSidebarOnMobile()"
      >
      </app-sidebar>

      <div class="grid min-h-0 min-w-0 grid-rows-[minmax(0,1fr)_auto] overflow-hidden">
        <main
          #mainContent
          class="min-h-0 p-4 md:p-5 lg:p-6"
          [class.overflow-y-auto]="!mainLoadingService.loading()"
          [class.overflow-hidden]="mainLoadingService.loading()"
        >
          <div
            class="min-h-full"
            [attr.inert]="mainLoadingService.loading() ? '' : null"
            [attr.aria-hidden]="mainLoadingService.loading() ? 'true' : null"
          >
            <router-outlet></router-outlet>
          </div>
        </main>

        @if (mainLoadingService.loading()) {
          <div
            class="pointer-events-auto fixed z-20 flex items-center justify-center bg-white/72 px-4 backdrop-blur-[3px]"
            [ngStyle]="mainOverlayStyle()"
            aria-live="polite"
            aria-busy="true"
          >
            <div class="w-full max-w-sm px-6 py-7 text-center">
              <div class="relative inline-flex select-none flex-col items-center">
                <div class="absolute inset-x-[-2.5rem] inset-y-[-1.5rem] rounded-[999px] bg-white/62 blur-2xl"></div>
                <div class="relative mx-auto h-14 w-14">
                  <div class="absolute inset-0 rounded-full border-[3px] border-primary-100"></div>
                  <div
                    class="absolute inset-0 animate-spin rounded-full border-[3px] border-transparent border-r-primary-400 border-t-primary-600"
                  ></div>
                  <div class="absolute inset-[9px] rounded-full bg-primary-50/80 ring-1 ring-primary-100/80"></div>
                </div>
                <p class="relative mt-4 text-[0.65rem] font-semibold uppercase tracking-[0.28em] text-primary-700">Procesando</p>
                <p class="relative mt-2 text-base font-semibold text-slate-900">
                  {{ mainLoadingService.message() }}
                </p>
                @if (mainLoadingService.secondaryMessage()) {
                  <p class="relative mt-2 text-sm text-slate-600">
                    {{ mainLoadingService.secondaryMessage() }}
                  </p>
                }
              </div>
            </div>
          </div>
        }

        <app-footer></app-footer>
      </div>
    </div>
  </div>
</div>
