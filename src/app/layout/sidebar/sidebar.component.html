<aside
  class="fixed inset-y-0 left-0 top-16 z-30 flex h-[calc(100vh-4rem)] min-h-0 flex-col overflow-hidden border-r border-gray-200 bg-white transition-all duration-300 ease-in-out lg:relative lg:top-0 lg:h-full lg:w-full"
  [class.w-[calc(100vw-1rem)]]="isMobile() && isOpen()"
  [class.max-w-sm]="isMobile()"
  [class.-translate-x-full]="isMobile() && !isOpen()"
  [class.translate-x-0]="!isMobile() || isOpen()"
>
  <div class="grid min-h-0 flex-1 grid-rows-[minmax(0,1fr)_auto] overflow-hidden">
    <nav class="sidebar-scroll min-h-0 overflow-y-auto px-3 py-4">
      <ul class="space-y-1.5">
        @for (item of menuItems(); track item.label) {
          <li>
            @if (item.children) {
              <div>
                <button
                  (click)="toggleSubmenu(item)"
                  class="group w-full flex items-center justify-between rounded-xl px-3 py-2.5 text-gray-700 transition-colors"
                  [class.bg-primary-50]="isSectionActive(item)"
                  [class.text-primary-700]="isSectionActive(item)"
                  [class.hover:bg-gray-100]="!isSectionActive(item)"
                  [class.hover:bg-primary-50]="isSectionActive(item)"
                >
                  <div class="flex items-center gap-3">
                    <svg
                      class="h-5 w-5 transition-colors"
                      [class.text-gray-500]="!isSectionActive(item)"
                      [class.text-primary-500]="isSectionActive(item)"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        [attr.d]="item.icon"
                      />
                    </svg>
                    <span class="text-sm font-medium">{{ item.label }}</span>
                  </div>
                  <svg
                    class="h-4 w-4 transition-transform duration-200"
                    [class.rotate-180]="item.expanded"
                    [class.text-primary-500]="isSectionActive(item)"
                    [class.text-gray-500]="!isSectionActive(item)"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 9l-7 7-7-7"
                    />
                  </svg>
                </button>

                <div
                  class="grid transition-[grid-template-rows] duration-300 ease-in-out"
                  [class.grid-rows-[0fr]]="!item.expanded"
                  [class.grid-rows-[1fr]]="item.expanded"
                >
                  <div class="min-h-0 overflow-hidden">
                    <div class="relative ml-7 mt-2 pl-4">
                      <span
                        class="absolute bottom-0 left-0 top-0 w-px rounded-full bg-gray-200"
                      ></span>

                      <ul class="space-y-0.5">
                        @for (child of item.children; track child.label) {
                          <li>
                            <a
                              [routerLink]="child.route"
                              routerLinkActive="text-primary-700"
                              #childLinkActive="routerLinkActive"
                              [routerLinkActiveOptions]="{ exact: true }"
                              (click)="onMenuClick()"
                              class="group relative flex items-center px-2 py-1.5 text-sm text-gray-600 transition-colors hover:text-gray-800"
                            >
                              <span class="font-medium leading-5">{{ child.label }}</span>
                              <span
                                class="absolute inset-y-0 -left-4 w-px rounded-full transition-colors"
                                [class.bg-primary-500]="childLinkActive.isActive"
                                [class.bg-transparent]="!childLinkActive.isActive"
                              ></span>
                            </a>
                          </li>
                        }
                      </ul>
                    </div>
                  </div>
                </div>
              </div>
            } @else {
              <a
                [routerLink]="item.route"
                routerLinkActive="bg-primary-50 text-primary-700 shadow-sm shadow-primary-100/60"
                (click)="onMenuClick()"
                class="group flex items-center gap-3 rounded-xl px-3 py-2.5 text-gray-700 transition-colors hover:bg-gray-100"
              >
                <svg
                  class="h-5 w-5 text-gray-500 transition-colors group-hover:text-primary-500 group-[.bg-primary-50]:text-primary-500"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    [attr.d]="item.icon"
                  />
                </svg>
                <span class="text-sm font-medium">{{ item.label }}</span>
              </a>
            }
          </li>
        }
      </ul>
    </nav>

    <div class="border-t border-gray-200 p-3">
      <button
        #accountTrigger
        (click)="toggleAccountMenu()"
        class="group flex w-full items-center gap-3 rounded-xl px-2.5 py-2 text-left transition-colors hover:bg-gray-100"
        type="button"
      >
        <div
          class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-primary-500 font-semibold text-white"
        >
          {{ authService.currentUser()?.username?.charAt(0)?.toUpperCase() }}
        </div>
        <div class="min-w-0 flex-1">
          <p class="truncate text-sm font-semibold text-primary-900">
            {{ authService.currentUser()?.username?.toUpperCase() }}
          </p>
          <p class="truncate text-xs text-gray-500">
            {{ authService.currentUser()?.role }}
          </p>
        </div>
        <svg
          class="h-4 w-4 shrink-0 text-gray-400 transition-transform duration-200"
          [style.transform]="getAccountChevronTransform()"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 9l-7 7-7-7"
          />
        </svg>
      </button>
    </div>
  </div>
</aside>

@if (accountMenuOpen()) {
  <div
    #accountMenuPanel
    class="sidebar-scroll fixed z-[120] overflow-y-auto rounded-xl border border-gray-200 bg-white py-1.5 shadow-2xl"
    [ngStyle]="accountMenuStyle()"
  >
    @for (item of accountMenuItems; track item.id) {
      <button
        (click)="onAccountMenuAction(item.id)"
        type="button"
        class="flex w-full items-center gap-3 px-3 py-2.5 text-left text-sm font-medium text-gray-700 transition-colors hover:bg-primary-50 hover:text-primary-700"
        [class.border-t]="item.divider"
        [class.border-gray-100]="item.divider"
      >
        <svg
          class="h-4 w-4 shrink-0"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            [attr.d]="item.icon"
          />
        </svg>
        <span class="min-w-0 flex-1 truncate">{{ item.label }}</span>
        @if (item.hint) {
          <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-gray-400">
            {{ item.hint }}
          </span>
        }
      </button>
    }
  </div>
}
