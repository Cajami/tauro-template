@let modal = renderedModal();

<div
  [class]="getOverlayClasses(modal?.config?.placement ?? 'center')"
  [class.pointer-events-none]="!modal"
  [class.opacity-0]="!isVisible()"
  [class.opacity-100]="isVisible()"
>
  <button
    type="button"
    class="absolute inset-0 bg-slate-950/45 transition-all duration-280 ease-[cubic-bezier(0.22,1,0.36,1)]"
    [class.opacity-0]="!isVisible()"
    [class.opacity-100]="isVisible()"
    [class.backdrop-blur-none]="!isVisible()"
    [class.backdrop-blur-[2px]]="isVisible()"
    aria-label="Cerrar modal"
    (click)="onBackdropClick()"
  ></button>

  @if (modal) {
    <section
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="modal.config.title"
      [class]="getDialogClasses(modal.config.size)"
      [class.opacity-0]="!isVisible()"
      [class.opacity-100]="isVisible()"
      [style.transform]="getDialogTransform()"
      [style.box-shadow]="isVisible() ? '' : '0 10px 30px rgba(15, 23, 42, 0.08)'"
    >
      <header
        class="flex items-start justify-between gap-3 border-b border-primary-600 bg-primary-500 px-4 py-2.5 text-primary-foreground sm:px-5 sm:py-3"
        [class.cursor-move]="modal.config.draggable"
        [class.cursor-default]="!modal.config.draggable"
        (pointerdown)="onHeaderPointerDown($event)"
      >
        <div class="min-w-0 space-y-px">
          <h2 class="text-base font-semibold tracking-tight text-primary-foreground sm:text-lg">
            {{ modal.config.title }}
          </h2>

          @if (modal.config.subtitle; as subtitle) {
            <p class="text-[11px] leading-4 text-primary-foreground/85 sm:text-xs sm:leading-5">
              {{ subtitle }}
            </p>
          }
        </div>

        @if (modal.config.showCloseButton) {
          <button
            type="button"
            class="inline-flex size-7 items-center justify-center rounded-full border border-primary-foreground/25 bg-primary-foreground/10 text-primary-foreground transition-colors hover:bg-primary-foreground/20 sm:size-8"
            aria-label="Cerrar"
            data-modal-close
            (click)="closeFromChrome()"
          >
            <span class="text-sm leading-none sm:text-base">×</span>
          </button>
        }
      </header>

      <div class="max-h-[calc(90vh-7rem)] overflow-auto bg-white px-4 py-4 sm:px-5">
        <ng-container
          *ngComponentOutlet="
            modal.component;
            injector: contentInjector();
            inputs: modal.config.inputs
          "
        ></ng-container>
      </div>

      @if (hasFooter(modal)) {
        <footer
          class="flex flex-wrap items-center justify-end gap-2.5 border-t border-gray-200 bg-white px-5 py-3"
        >
          @for (action of modal.config.actions; track trackAction($index, action)) {
            <app-button
              [variant]="action.variant ?? 'secondary'"
              [color]="action.color ?? 'primary'"
              [disabled]="isActionDisabled(action)"
              size="sm"
              (clicked)="onActionClick(action)"
            >
              {{ action.label }}
            </app-button>
          }
        </footer>
      }
    </section>
  }
</div>
