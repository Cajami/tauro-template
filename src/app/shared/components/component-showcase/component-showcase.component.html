<div class="relative z-0 my-12 flex flex-col gap-4" data-showcase-root>
  <div class="flex flex-col gap-1 px-1">
    <h3 class="text-xl font-bold tracking-tight text-foreground">
      {{ title() }}
    </h3>
    <p class="text-sm text-muted-foreground">{{ description() }}</p>
  </div>

  <div
    class="grid grid-cols-1 overflow-visible rounded-xl border border-border bg-card shadow-sm lg:grid-cols-2"
  >
    <div
      class="relative flex items-center justify-center overflow-visible rounded-t-xl bg-background p-10 lg:rounded-l-xl lg:rounded-tr-none"
    >
      <div
        class="showcase-preview-pattern absolute inset-0 z-0 rounded-t-xl opacity-20 lg:rounded-l-xl lg:rounded-tr-none"
      ></div>

      <div class="z-10 w-full max-w-sm overflow-visible">
        <ng-content></ng-content>
      </div>
    </div>

    <div class="showcase-code-panel flex h-full flex-col overflow-hidden rounded-b-xl lg:rounded-r-xl lg:rounded-bl-none">
      <div class="showcase-code-tabs flex">
        <button
          (click)="activeTab.set('html')"
          [class.showcase-code-tab-active]="activeTab() === 'html'"
          class="showcase-code-tab"
        >
          HTML
        </button>
        <button
          (click)="activeTab.set('ts')"
          [class.showcase-code-tab-active]="activeTab() === 'ts'"
          class="showcase-code-tab"
        >
          TypeScript
        </button>
      </div>

      <div class="custom-scrollbar overflow-auto p-6">
        @if (activeTab() === "html") {
          <pre class="text-sm font-mono"><code class="showcase-code-html">{{ htmlCode() }}</code></pre>
        } @else {
          <pre class="text-sm font-mono"><code class="showcase-code-ts">{{ tsCode() }}</code></pre>
        }
      </div>
    </div>
  </div>
</div>
